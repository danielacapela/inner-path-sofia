<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />

  <title>inner.path™ · Sofia v0.16</title>

  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #1A1916;
  --ink-mid: #6A6760;
  --ink-faint: #ABA8A1;
  --ink-ghost: #E4E1DA;
  --paper: #F6F3ED;
  --paper-white: #FDFCF9;
  --moss: #3B5C48;
  --moss-light: #D4E6DA;
  --moss-mid: #6B9478;
  --gold: #8B6914;
  --gold-light: #F5EDD4;
  --deep: #3C3489;
  --deep-light: #EEEDFE;
  --mono: 'DM Mono', monospace;
  --serif: 'Cormorant Garamond', serif;
  --display: 'Bebas Neue', sans-serif;
}

html { background: #E8E4DC; }
body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 1.25rem .65rem;
  background: #E8E4DC;
  color: var(--ink);
  font-family: var(--mono);
}
button, textarea, input { font: inherit; }
button { border: 0; background: none; color: inherit; cursor: pointer; }
button:disabled { cursor: default; }

.shell {
  width: min(100%, 390px);
  min-height: 820px;
  background: var(--paper);
  box-shadow: 0 40px 80px rgba(0,0,0,.14);
  position: relative;
  padding-bottom: 5.5rem;
  overflow: hidden;
}

.top-panel {
  display: block;
  background: var(--paper-white);
  border-bottom: 1px solid var(--ink-ghost);
  position: sticky;
  top: 0;
  z-index: 40;
}
.session-bar {
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  scroll-snap-type: x proximity;
  -webkit-overflow-scrolling: touch;
}
.session-bar::-webkit-scrollbar { display: none; }
.session-tab {
  flex: 0 0 auto;
  min-width: 55px;
  scroll-snap-align: start;
  padding: .68rem .62rem;
  border-right: 1px solid var(--ink-ghost);
  font-size: 8px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--ink-faint);
  position: relative;
}
.session-tab.is-active { color: var(--moss); }
.session-tab.is-active::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 2px;
  background: var(--moss);
}
.session-tab.is-current { color: var(--moss); }
.session-tab.is-locked { color: #d0ccc3; }
.session-drag-hint {
  padding: .35rem .8rem .42rem;
  border-top: 1px solid rgba(228,225,218,.75);
  color: var(--ink-faint);
  font-size: 7px;
  letter-spacing: .1em;
  text-transform: uppercase;
}
.language-toggle {
  display: inline-flex;
  border: 1px solid var(--ink-ghost);
  background: var(--paper-white);
}
.language-toggle button {
  padding: .43rem .6rem;
  min-width: 34px;
  font-size: 8px;
  letter-spacing: .08em;
  color: var(--ink-faint);
}
.language-toggle button + button { border-left: 1px solid var(--ink-ghost); }
.language-toggle button.is-active {
  background: var(--ink);
  color: var(--paper-white);
}
.header-language {
  margin-top: .6rem;
  margin-bottom: .25rem;
}

.header {
  padding: 1.45rem 1.5rem 1.15rem;
  border-bottom: 1px solid var(--ink-ghost);
  position: relative;
}
.header::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--moss);
}
.header.phase-integration::before { background: var(--gold); }
.header.phase-deep::before { background: var(--deep); }
.header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: .45rem; }
.logo { font-size: 9px; letter-spacing: .16em; color: var(--ink-faint); text-transform: lowercase; }
.avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--moss-light);
  color: var(--moss);
  font-size: 10px;
  text-transform: lowercase;
}
.product-line { font-size: 8px; letter-spacing: .12em; color: var(--ink-faint); text-transform: lowercase; margin-bottom: .85rem; }
.greeting-small { font-family: var(--serif); font-size: 15px; color: var(--ink-mid); }
.greeting-name {
  font-family: var(--display);
  font-size: 44px;
  line-height: .92;
  letter-spacing: .02em;
  font-weight: 400;
}
.greeting-name span { color: var(--moss); }
.week-tag { display: flex; gap: 8px; align-items: center; margin-top: .45rem; }
.week-pill { color: var(--paper-white); padding: 3px 9px; font-size: 8px; letter-spacing: .12em; text-transform: uppercase; background: var(--moss); }
.week-pill.phase-integration { background: var(--gold); }
.week-pill.phase-deep { background: var(--deep); }
.week-label { color: var(--ink-faint); font-size: 9px; letter-spacing: .04em; }
.phase-line-text { margin-top: .65rem; color: var(--ink-faint); font-size: 8px; letter-spacing: .06em; line-height: 1.45; text-transform: lowercase; }

.values-strip { margin: 1rem 1.5rem 0; }
.values-label { display: block; margin-bottom: .45rem; color: var(--ink-faint); font-size: 8px; letter-spacing: .12em; text-transform: uppercase; }
.values-list { display: flex; flex-wrap: wrap; gap: 6px; }
.value-pill { background: var(--moss-light); color: var(--moss); font-family: var(--display); font-size: 13px; letter-spacing: .06em; padding: 4px 8px 2px; text-transform: uppercase; }

.notice { margin: 1rem 1.5rem 0; padding: .7rem .9rem; background: var(--paper-white); border: 1px solid var(--ink-ghost); color: var(--ink-faint); font-size: 8px; letter-spacing: .05em; line-height: 1.5; }
.preview-note {
  background: var(--gold-light);
  border: 1px solid rgba(139,105,20,.25);
  padding: .75rem .9rem;
  display: flex;
  flex-direction: column;
  gap: .25rem;
}
.preview-note strong {
  color: var(--gold);
  font-size: 8px;
  letter-spacing: .14em;
  text-transform: uppercase;
}
.preview-note span {
  color: var(--ink-mid);
  font-size: 9px;
  line-height: 1.45;
  letter-spacing: .03em;
}
.message-banner { margin: 1rem 1.5rem 0; display: grid; grid-template-columns: 3px 1fr; }
.message-bar { background: var(--moss); }
.message-bar.phase-integration { background: var(--gold); }
.message-bar.phase-deep { background: var(--deep); }
.message-body { padding: .85rem 1rem; background: var(--paper-white); border: 1px solid var(--ink-ghost); border-left: 0; }
.message-label { margin-bottom: .35rem; color: var(--moss-mid); font-size: 8px; letter-spacing: .14em; text-transform: uppercase; }
.message-text { font-family: var(--serif); font-size: 14px; font-style: italic; font-weight: 300; line-height: 1.65; color: var(--ink); }
.message-signature { margin-top: .5rem; color: var(--ink-faint); font-size: 8px; letter-spacing: .08em; }

.section { margin: 1.25rem 1.5rem 0; }
.last-section { margin-bottom: 1rem; }
.section-head { display: flex; justify-content: space-between; gap: 1rem; align-items: baseline; margin-bottom: .65rem; }
.section-label { color: var(--ink-faint); font-size: 8px; letter-spacing: .14em; text-transform: uppercase; }
.section-value { color: var(--moss); font-size: 8px; letter-spacing: .08em; text-transform: lowercase; text-align: right; }

.empty-card, .extra-card, .journal-card, .info-card, .memory-card, .timeline-card, .breath-card {
  background: var(--paper-white);
  border: 1px solid var(--ink-ghost);
}
.empty-card { padding: 1rem; }
.empty-title { font-family: var(--display); font-size: 22px; letter-spacing: .05em; margin-bottom: .35rem; }
.empty-card p, .extra-card p, .breath-card p { font-family: var(--serif); font-size: 14px; font-weight: 300; line-height: 1.65; color: var(--ink-mid); }

.audio-shortcut {
  width: 100%;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 1rem;
  align-items: center;
  padding: 1rem;
  background: var(--ink);
  color: var(--paper-white);
  text-align: left;
}
.audio-shortcut-kicker, .audio-shortcut-detail { display: block; color: #6f6d67; font-size: 8px; letter-spacing: .12em; text-transform: uppercase; }
.audio-shortcut-title { display: block; font-family: var(--display); font-size: 22px; line-height: 1; letter-spacing: .05em; margin: .25rem 0; }
.audio-shortcut-play { border: 1px solid var(--moss-mid); border-radius: 50%; width: 46px; height: 46px; display: flex; align-items: center; justify-content: center; color: var(--moss-light); font-size: 8px; letter-spacing: .1em; text-transform: uppercase; }
.audio-card { background: var(--ink); padding: 1.1rem; color: var(--paper-white); }
.audio-kicker, .extra-kicker { color: var(--moss-mid); font-size: 8px; letter-spacing: .14em; text-transform: uppercase; margin-bottom: .55rem; }
.audio-card h2, .extra-card h2, .breath-card h2 { font-family: var(--display); font-size: 24px; line-height: 1; letter-spacing: .05em; margin-bottom: .35rem; font-weight: 400; }
.audio-card p { color: #77746d; font-size: 9px; letter-spacing: .06em; margin-bottom: .85rem; }
.spotify-player { border-radius: 0; background: #000; }

.task-list { border-top: 1px solid var(--ink-ghost); }
.task-card {
  width: 100%;
  display: grid;
  grid-template-columns: 28px 1fr auto;
  gap: 10px;
  align-items: start;
  padding: .9rem 0;
  border-bottom: 1px solid var(--ink-ghost);
  text-align: left;
}
.task-num { color: var(--ink-faint); font-size: 9px; padding-top: 2px; }
.task-title { display: block; font-size: 13px; color: var(--ink); margin-bottom: 3px; line-height: 1.3; }
.task-detail { display: block; color: var(--ink-faint); font-size: 9px; letter-spacing: .03em; line-height: 1.45; }
.task-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
.task-check { width: 19px; height: 19px; border: 1px solid var(--ink-ghost); display: flex; align-items: center; justify-content: center; color: transparent; transition: all .2s; }
.task-type { color: var(--ink-faint); font-size: 7px; letter-spacing: .1em; text-transform: uppercase; }
.task-card.is-done .task-check { color: white; background: var(--moss); border-color: var(--moss); }
.task-card.is-done .task-title { color: var(--ink-faint); text-decoration: line-through; }

.memory-card { padding: 1rem; }
.memory-title { font-family: var(--serif); font-size: 14px; font-style: italic; font-weight: 300; line-height: 1.55; color: var(--ink-mid); margin-bottom: .75rem; }
.mini-item { display: flex; align-items: flex-start; gap: 8px; padding: .42rem 0; border-top: 1px solid var(--ink-ghost); color: var(--ink-mid); font-size: 9px; letter-spacing: .03em; line-height: 1.45; }
.mini-item span { width: 5px; height: 5px; margin-top: 4px; flex: 0 0 auto; background: var(--moss-mid); }

.info-card { padding: 1rem; }
.info-intro { font-family: var(--serif); font-style: italic; font-weight: 300; font-size: 14px; margin-bottom: .8rem; color: var(--ink); }
.info-row { display: grid; grid-template-columns: 8px 1fr; gap: 9px; padding: .55rem 0; border-top: 1px solid var(--ink-ghost); }
.info-row > span { width: 6px; height: 6px; border: 1px solid var(--moss-mid); background: var(--moss-light); margin-top: 4px; }
.info-row strong { display: block; font-size: 10px; color: var(--ink-mid); letter-spacing: .03em; margin-bottom: 2px; }
.info-row small { display: block; font-size: 9px; color: var(--ink-faint); letter-spacing: .03em; line-height: 1.45; }

.journal-card { padding: 1rem; }
.journal-question { display: block; font-family: var(--serif); font-style: italic; font-size: 15px; font-weight: 300; line-height: 1.5; color: var(--ink); margin-bottom: .55rem; }
.journal-area { width: 100%; border: 0; border-bottom: 1px solid var(--ink-ghost); background: transparent; outline: 0; resize: vertical; min-height: 90px; margin-bottom: 1.1rem; padding: .2rem 0 .55rem; font-family: var(--serif); font-style: italic; font-size: 14px; line-height: 1.6; color: var(--ink); }
.journal-area::placeholder { color: var(--ink-faint); }

.extra-card, .breath-card { padding: 1rem; }
.tap-list { display: grid; gap: 6px; margin-top: .85rem; }
.tap-point { display: grid; grid-template-columns: 30px 1fr; gap: 8px; align-items: center; padding: .65rem .7rem; border: 1px solid var(--ink-ghost); text-align: left; font-size: 10px; color: var(--ink-mid); text-transform: lowercase; }
.tap-point span { color: var(--ink-faint); }
.tap-point.is-done { background: var(--moss-light); border-color: var(--moss-light); color: var(--moss); }

.breath-card { text-align: center; background: var(--ink); color: var(--paper-white); border-color: var(--ink); }
.breath-card p { color: #77746d; }
.breath-circle { width: 96px; height: 96px; border-radius: 50%; border: 1px solid #3A3A35; color: #77746d; margin: 1rem auto .85rem; display: flex; align-items: center; justify-content: center; font-size: 9px; letter-spacing: .12em; text-transform: uppercase; transition: all .4s; }
.breath-circle.inhale { transform: scale(1.12); border-color: var(--moss-mid); color: var(--moss-light); background: rgba(59,92,72,.14); }
.breath-days { display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; }
.breath-day { width: 28px; height: 28px; border: 1px solid #3A3A35; color: #77746d; font-size: 8px; }
.breath-day.is-done { background: var(--moss); border-color: var(--moss); color: white; }

.radar-wrap { display: flex; justify-content: center; margin: 1rem 0; padding: .5rem; background: var(--paper); border: 1px solid var(--ink-ghost); }
#casulo-radar { width: 220px; height: 220px; }
.radar-grid circle, .radar-grid line { fill: none; stroke: var(--ink-ghost); stroke-width: .8; }
.radar-shape { fill: rgba(59,92,72,.22); stroke: var(--moss); stroke-width: 1.5; }
.radar-center { fill: var(--moss); }
.slider-list { display: grid; gap: .65rem; margin-top: .85rem; }
.slider-row { display: grid; grid-template-columns: 1fr 100px 24px; gap: 8px; align-items: center; font-size: 8px; letter-spacing: .05em; color: var(--ink-mid); text-transform: uppercase; }
.slider-row input { width: 100%; accent-color: var(--moss); }
.slider-row strong { color: var(--moss); text-align: right; font-size: 9px; }
.photo-note { margin-top: 1rem; padding: .75rem; border: 1px solid var(--ink-ghost); background: var(--paper); }
.photo-note strong { display: block; font-size: 8px; letter-spacing: .12em; text-transform: uppercase; color: var(--moss); margin-bottom: .3rem; }
.photo-note span, .mini-note { display: block; color: var(--ink-faint); font-size: 8px; letter-spacing: .04em; line-height: 1.55; }

.phrase-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-top: .9rem; }
.phrase-btn { border: 1px solid var(--ink-ghost); padding: .8rem .5rem; font-family: var(--serif); font-size: 15px; font-style: italic; color: var(--ink-mid); }
.phrase-btn.is-done { background: var(--moss-light); border-color: var(--moss-light); color: var(--moss); }
.continuity-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-top: 1rem; }
.day-cell { aspect-ratio: 1 / 1; border: 1px solid var(--ink-ghost); color: var(--ink-faint); font-size: 8px; }
.day-cell.is-done { background: var(--moss); border-color: var(--moss); color: white; }

.timeline-card { overflow: hidden; }
.timeline-item { width: 100%; display: grid; grid-template-columns: 38px 1fr auto; gap: 10px; align-items: center; padding: .8rem .85rem; border-bottom: 1px solid var(--ink-ghost); text-align: left; background: var(--paper-white); }
.timeline-item:last-child { border-bottom: 0; }
.timeline-item.locked { opacity: .45; }
.timeline-item.is-active { background: var(--paper); }
.timeline-dot { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--moss); color: white; font-size: 8px; letter-spacing: .05em; }
.timeline-dot.phase-integration { background: var(--gold); }
.timeline-dot.phase-deep { background: var(--deep); }
.timeline-copy strong { display: block; font-size: 11px; color: var(--ink); margin-bottom: 2px; }
.timeline-copy small { display: block; font-size: 8px; color: var(--ink-faint); letter-spacing: .03em; line-height: 1.35; }
.timeline-status { color: var(--ink-faint); font-size: 7px; letter-spacing: .12em; text-transform: uppercase; }
.timeline-card + .mini-note { margin-top: .65rem; }

.clear-section { margin-top: .9rem; }
.clear-btn { width: 100%; border: 1px solid var(--ink-ghost); padding: .75rem .5rem; color: var(--ink-faint); font-size: 8px; letter-spacing: .12em; text-transform: uppercase; background: var(--paper-white); }

.bottom-nav {
  position: fixed;
  left: 50%;
  bottom: 0;
  transform: translateX(-50%);
  width: min(100%, 390px);
  display: grid;
  grid-template-columns: repeat(4,1fr);
  background: var(--ink);
  z-index: 80;
}
.nav-button { padding: .8rem .2rem 1rem; color: #5A5A55; border-right: 1px solid #282720; font-size: 7px; letter-spacing: .11em; text-transform: uppercase; display: flex; flex-direction: column; gap: 4px; align-items: center; }
.nav-button:last-child { border-right: 0; }
.nav-button span { font-size: 16px; line-height: 1; }
.nav-button.is-active { color: var(--paper-white); box-shadow: inset 0 1px 0 var(--moss-mid); }

@media (max-width: 420px) {
  body { padding: 0; }
  .shell { width: 100%; min-height: 100vh; box-shadow: none; }
  .bottom-nav { width: 100%; }
}

.sub-block {
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 1px solid var(--ink-ghost);
}
.sub-block h3 {
  font-size: 8px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--moss);
  margin-bottom: .6rem;
  font-weight: 400;
}
.continuity-card .sub-block h3 { color: var(--deep); }
.journal-area.compact { margin-top: .35rem; margin-bottom: 0; }

/* v0.8 · dois modos de entrada */
.notice-line { margin-bottom: .55rem; }
.client-switcher { display: flex; gap: 6px; flex-wrap: wrap; }
.client-chip {
  border: 1px solid var(--ink-ghost);
  background: var(--paper);
  color: var(--ink-faint);
  padding: .45rem .55rem;
  font-size: 7px;
  letter-spacing: .1em;
  text-transform: uppercase;
}
.client-chip.is-active {
  background: var(--ink);
  border-color: var(--ink);
  color: var(--paper-white);
}
.phrase-static {
  border: 1px solid var(--ink-ghost);
  padding: .8rem .5rem;
  font-family: var(--serif);
  font-size: 15px;
  font-style: italic;
  color: var(--ink-mid);
  background: var(--paper);
  line-height: 1.25;
}
.first-sub-block { margin-top: 0; padding-top: 0; border-top: 0; }
.reconnect-card .sub-block h3 { color: var(--gold); }

.sub-help { font-family: var(--mono); font-size: 9px; letter-spacing: .03em; line-height: 1.55; color: var(--ink-faint); margin: -.2rem 0 .75rem; }
.inner-photo-block { margin: 1rem 0 1.2rem; padding: 1rem; border: 1px solid var(--ink-ghost); background: var(--paper-white); }
.photo-upload-box { display: flex; min-height: 132px; border: 1px dashed var(--ink-ghost); align-items: center; justify-content: center; flex-direction: column; gap: .5rem; cursor: pointer; color: var(--ink-faint); font-family: var(--mono); font-size: 9px; letter-spacing: .08em; text-transform: uppercase; overflow: hidden; position: relative; }
.photo-upload-box input { display: none; }
.photo-upload-box img { display: none; max-width: 100%; max-height: 220px; object-fit: contain; }
.photo-upload-box img.is-visible { display: block; }
.inner-photo-block small { display: block; margin-top: .55rem; font-family: var(--mono); font-size: 8px; line-height: 1.5; letter-spacing: .04em; color: var(--ink-faint); }

.client-link-line {
  margin-top: 0.55rem;
  font-family: var(--mono);
  font-size: 7px;
  line-height: 1.45;
  letter-spacing: .04em;
  color: var(--ink-faint);
  word-break: break-all;
}

  </style>
</head>

  <script>
/*

const UI_TEXT = {

  <script>
const STORAGE_PREFIX = "innerPathV015Sofia";

function normaliseClientKey(value) {
  return String(value || "").trim().toLowerCase();
}

function findClientByKey(key) {
  const clean = normaliseClientKey(key);
  if (!clean) return null;
  return INNER_PATH_DATA.clients.find(client => {
    const keys = [client.id, client.slug, client.code].filter(Boolean).map(normaliseClientKey);
    return keys.includes(clean);
  }) || null;
}

function clientKeyFromUrl() {
  try {
    const params = new URLSearchParams(window.location.search);
    return params.get("cliente") || params.get("client") || params.get("c");
  } catch (_) {
    return null;
  }
}

function setClientInUrl(client) {
  if (!client || !client.slug || !window.history?.replaceState) return;
  const url = new URL(window.location.href);
  url.searchParams.set("cliente", client.slug);
  window.history.replaceState({}, "", url);
}

const requestedClient = findClientByKey(clientKeyFromUrl());
const storedClient = findClientByKey(getStoredGlobal("clientId", ""));
const fallbackClient = INNER_PATH_DATA.clients.find(client => client.id === INNER_PATH_DATA.app.defaultClientId) || INNER_PATH_DATA.clients[0];
const defaultClient = requestedClient || storedClient || fallbackClient;

const state = {
  language: getStoredGlobal("language", INNER_PATH_DATA.app.defaultLanguage),
  activeClientId: defaultClient.id,
  activeSessionId: null,
  activeTab: "home",
  breathTimer: null,
  breathRunning: false,
  breathStep: 0
};

state.activeSessionId = currentClient().activeSessionId;

const TAP_POINTS = {
  pt: ["ponto karate", "topo da cabeça", "sobrancelha", "lado do olho", "debaixo do olho", "debaixo do nariz", "queixo", "clavícula", "debaixo do braço"],

};

const BREATH_DAYS = {
  pt: ["S", "T", "Q", "Q", "S", "S", "D"],
  en: ["M", "T", "W", "T", "F", "S", "S"]
};

function getStoredGlobal(key, fallback) {
  try {
    const raw = localStorage.getItem(`${STORAGE_PREFIX}:${key}`);
    return raw ? JSON.parse(raw) : fallback;
  } catch (_) {
    return fallback;
  }
}

function setStoredGlobal(key, value) {
  localStorage.setItem(`${STORAGE_PREFIX}:${key}`, JSON.stringify(value));
}

function currentClient() {
  return INNER_PATH_DATA.clients.find(client => client.id === state.activeClientId) || defaultClient;
}

function clientSessions() {
  return currentClient().sessions || [];
}

function storageKey(...parts) {
  return [STORAGE_PREFIX, currentClient().id, ...parts].join(":");
}

function getStored(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (_) {
    return fallback;
  }
}

function setStored(key, value) {
  localStorage.setItem(key, JSON.stringify(value));
}

function translate(value) {
  if (value && typeof value === "object" && !Array.isArray(value)) return value[state.language] ?? value.pt ?? "";
  return value ?? "";
}

function ui(key) {
  return INNER_PATH_DATA.ui[state.language][key] || INNER_PATH_DATA.ui.pt[key] || key;
}

function currentSession() {
  return clientSessions().find(session => session.id === state.activeSessionId) || clientSessions()[0];
}

function sessionById(id) {
  return clientSessions().find(session => session.id === id);
}

function phaseData(session) {
  return INNER_PATH_DATA.phases[session.phase]?.[state.language] || INNER_PATH_DATA.phases[session.phase]?.pt || {};
}

function listForLang(value) {

          <small>${state.language === "pt" ? "demo local · na versão real, a foto deve ficar protegida" : "local demo · in the real version, the photo must be protected"}</small>
        </div>
        <div class="sub-block">
          <h3>${state.language === "pt" ? "1 · O que esta parte precisava" : "1 · What this part needed"}</h3>
          <div class="phrase-grid">
            ${needs.map((need, index) => `<button class="phrase-btn ${selectedNeeds.includes(index) ? "is-done" : ""}" onclick="toggleStoredIndex('${session.id}', 'innerNeeds', ${index})">${need}</button>`).join("")}
          </div>
        </div>
        <div class="sub-block">
          <h3>${state.language === "pt" ? "2 · A resposta da adulta interna" : "2 · The inner adult response"}</h3>
          <div class="phrase-grid">
            ${adultPhrases.map((phrase, index) => `<button class="phrase-btn ${selectedPhrases.includes(index) ? "is-done" : ""}" onclick="toggleStoredIndex('${session.id}', 'adultPhrases', ${index})">${phrase}</button>`).join("")}
          </div>
        </div>
      </div>
    </section>
  `;
}

function renderContinuityExtra(session) {
  const misalignment = state.language === "pt"
    ? ["agrado demais", "calo o que sinto", "entro em culpa", "volto à comparação", "isolo-me", "deixo de dormir bem", "perco contacto com o corpo", "fico reactiva"]
    : ["I over-please", "I silence what I feel", "I go into guilt", "I return to comparison", "I isolate", "I stop sleeping well", "I lose contact with my body", "I become reactive"];
  const regulateOptions = state.language === "pt"
    ? ["coerência cardíaca 5-5", "tapping", "meditação", "mão no peito e ventre", "caminhada consciente"]
    : ["heart coherence 5-5", "tapping", "meditation", "hand on chest and belly", "conscious walk"];
  const writingOptions = state.language === "pt"
    ? ["check-in 0 a 10", "journaling livre", "o que estou a tolerar?", "que escolha honra os meus valores?", "carta não enviada", "exercício ROSE"]
    : ["0 to 10 check-in", "free journaling", "what am I tolerating?", "which choice honours my values?", "unsent letter", "ROSE exercise"];
  const toolOptions = state.language === "pt"
    ? ["ROSE", "coerência cardíaca", "tapping", "meditação", "journaling", "carta simbólica", "casulo / check-in"]
    : ["ROSE", "heart coherence", "tapping", "meditation", "journaling", "symbolic letter", "cocoon / check-in"];
  const selectedMisalignment = getStored(storageKey(session.id, "misalignment"), []);
  const selectedRegulate = getStored(storageKey(session.id, "anchorRegulate"), []);
  const selectedWrite = getStored(storageKey(session.id, "anchorWrite"), []);
  const selectedTools = getStored(storageKey(session.id, "continuityTools"), []);
  const choice = getStored(storageKey(session.id, "anchorChoice"), "");
  return `
    <section class="section">
      <div class="extra-card continuity-card">
        <div class="extra-kicker">30 dias</div>
        <h2>${translate(session.extra.title)}</h2>
        <p>${translate(session.extra.body)}</p>
        <div class="sub-block">
          <h3>${state.language === "pt" ? "1 · Sinais de desalinhamento" : "1 · Signs of misalignment"}</h3>
          <div class="phrase-grid">${misalignment.map((item, index) => `<button class="phrase-btn ${selectedMisalignment.includes(index) ? "is-done" : ""}" onclick="toggleStoredIndex('${session.id}', 'misalignment', ${index})">${item}</button>`).join("")}</div>
        </div>
        <div class="sub-block">
          <h3>${state.language === "pt" ? "2 · Âncora para regular" : "2 · Anchor to regulate"}</h3>
          <div class="phrase-grid">${regulateOptions.map((item, index) => `<button class="phrase-btn ${selectedRegulate.includes(index) ? "is-done" : ""}" onclick="toggleStoredIndex('${session.id}', 'anchorRegulate', ${index})">${item}</button>`).join("")}</div>
        </div>
        <div class="sub-block">
          <h3>${state.language === "pt" ? "3 · Âncora para escrever" : "3 · Anchor to write"}</h3>
          <div class="phrase-grid">${writingOptions.map((item, index) => `<button class="phrase-btn ${selectedWrite.includes(index) ? "is-done" : ""}" onclick="toggleStoredIndex('${session.id}', 'anchorWrite', ${index})">${item}</button>`).join("")}</div>
        </div>
        <div class="sub-block">
          <h3>${state.language === "pt" ? "4 · Ferramenta de continuidade" : "4 · Continuity tool"}</h3>
          <div class="phrase-grid">${toolOptions.map((item, index) => `<button class="phrase-btn ${selectedTools.includes(index) ? "is-done" : ""}" onclick="toggleStoredIndex('${session.id}', 'continuityTools', ${index})">${item}</button>`).join("")}</div>
        </div>
        <div class="sub-block">
          <h3>${state.language === "pt" ? "5 · Carta à nova fase" : "5 · Letter to the new phase"}</h3>
          <p class="sub-help">${state.language === "pt" ? "Escreve à versão de ti que começa agora: quem és, o que levas contigo e o que escolhes deixar para trás." : "Write to the version of you that begins now: who you are, what you carry forward and what you choose to leave behind."}</p>
          <textarea class="journal-area compact" rows="5" placeholder="${state.language === "pt" ? "hoje começo uma nova fase..." : "today I begin a new phase..."}" oninput="saveContinuityLetter('${session.id}', this.value)">${getStored(storageKey(session.id, "continuityLetter"), "")}</textarea>
        </div>
        <div class="sub-block">
          <h3>${state.language === "pt" ? "6 · A minha escolha alinhada" : "6 · My aligned choice"}</h3>
          <textarea class="journal-area compact" rows="3" placeholder="${state.language === "pt" ? "durante 30 dias, eu escolho..." : "for 30 days, I choose..."}" oninput="saveContinuityChoice('${session.id}', this.value)">${choice}</textarea>
        </div>
      </div>
    </section>
  `;
}

function renderJourneyTimeline() {
  return `
    <section class="section last-section">
      <div class="section-head">
        <span class="section-label">${ui("path")}</span>
        <span class="section-value">${currentClient().mode === "new" ? ui("pathSub") : (state.language === "pt" ? "percurso personalizado" : "custom journey")}</span>
      </div>
      <div class="timeline-card">
        ${clientSessions().map(session => {
          const locked = session.status === "locked";
          const canOpen = !locked || previewLockedSessions();
          return `
            <button class="timeline-item ${session.status} ${session.id === state.activeSessionId ? "is-active" : ""}" ${canOpen ? `onclick="switchSession('${session.id}')"` : "disabled"}>
              <span class="timeline-dot phase-${session.phase}">${shortForTimeline(session)}</span>
              <span class="timeline-copy">
                <strong>${translate(session.title)}</strong>
                <small>${translate(session.intent)}</small>
              </span>
              <span class="timeline-status">${session.status === "locked" ? ui("locked") : session.status === "current" ? ui("current") : ui("done")}</span>
            </button>
          `;
        }).join("")}
      </div>
      <div class="mini-note">${currentClient().mode === "new" ? ui("lockedHint") : (state.language === "pt" ? "cliente em continuidade: a Daniela acrescenta as próximas semanas conforme o processo pedir" : "continuity client: Daniela adds the next weeks according to the process")}</div>
    </section>
  `;
}

function renderClearData() {
  return `
    <section class="section clear-section">
      <button class="clear-btn" onclick="clearClientStorage()">${ui("clear")}</button>
    </section>
  `;
}

function renderBottomNav(session) {
  const extraLabel = session.extra?.type === "reconnect" ? (state.language === "pt" ? "casulo" : "cocoon") : ui("navExtra");
  const buttons = [
    { id: "home", label: ui("navHome"), icon: "⌂" },
    { id: "audio", label: ui("navMeditation"), icon: "▷" },
    { id: "journal", label: ui("navJournal"), icon: "✎" },
    { id: "extra", label: extraLabel, icon: "♡" }
  ];
  return `
    <nav class="bottom-nav" aria-label="navegação principal">
      ${buttons.map(button => `
        <button class="nav-button ${state.activeTab === button.id ? "is-active" : ""}" onclick="switchTab('${button.id}')">
          <span>${button.icon}</span>${button.label}
        </button>
      `).join("")}
    </nav>
  `;
}

function setLanguage(language) {
  state.language = language;
  setStoredGlobal("language", language);
  renderApp();
}

function switchClient(clientId) {
  const client = INNER_PATH_DATA.clients.find(c => c.id === clientId);
  if (!client) return;
  state.activeClientId = clientId;
  state.activeSessionId = client.activeSessionId;
  state.activeTab = "home";
  setStoredGlobal("clientId", clientId);
  setClientInUrl(client);
  renderApp();
}

function switchSession(sessionId) {
  const session = sessionById(sessionId);
  if (!session) return;
  if (session.status === "locked" && !previewLockedSessions()) return;
  state.activeSessionId = sessionId;
  state.activeTab = "home";
  renderApp();
}

function switchTab(tab) {
  state.activeTab = tab;
  renderApp();
}

function toggleTask(sessionId, index) {
  const key = storageKey(sessionId, "tasks");
  const done = getStored(key, []);
  const next = done.includes(index) ? done.filter(item => item !== index) : [...done, index];
  setStored(key, next);
  renderApp();
}

function updateProgressLabel(session) {
  const label = document.getElementById("progress-label");
  const tasks = listForLang(session.tasks);
  if (!label || !tasks.length) return;
  const done = getStored(storageKey(session.id, "tasks"), []);
  label.textContent = `${Math.round((done.length / tasks.length) * 100)}%`;
}

function saveJournal(sessionId, index, value) {
  setStored(storageKey(sessionId, "journal", index), value);
}

function saveQuiz(sessionId, index, value) {
  setStored(storageKey(sessionId, "quiz", index), Number(value));
}

function saveCasulo(sessionId, areaId, value) {
  setStored(storageKey(sessionId, "casulo", areaId), Number(value));
}

function renderCasuloRadar(sessionId) {
  const svg = document.getElementById("casulo-radar");
  if (!svg) return;
  const cx = 110;
  const cy = 110;
  const maxR = 78;
  const areas = INNER_PATH_DATA.casuloAreas;
  const points = areas.map((area, index) => {
    const value = getStored(storageKey(sessionId, "casulo", area.id), 5);
    const angle = (-90 + (360 / areas.length) * index) * Math.PI / 180;
    const r = (value / 10) * maxR;
    return [cx + Math.cos(angle) * r, cy + Math.sin(angle) * r];
  });
  const axis = areas.map((area, index) => {
    const angle = (-90 + (360 / areas.length) * index) * Math.PI / 180;
    const x = cx + Math.cos(angle) * maxR;
    const y = cy + Math.sin(angle) * maxR;
    return `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" />`;
  }).join("");
  const rings = [2,4,6,8,10].map(step => `<circle cx="${cx}" cy="${cy}" r="${(step/10)*maxR}" />`).join("");
  svg.innerHTML = `<g class="radar-grid">${rings}${axis}</g><polygon class="radar-shape" points="${points.map(p => p.join(",")).join(" ")}" /><circle cx="${cx}" cy="${cy}" r="2" class="radar-center" />`;
}

function buildBreathDays(session) {
  const container = document.getElementById("breath-days");
  if (!container) return;
  const done = getStored(storageKey(session.id, "breath-days"), []);
  container.innerHTML = BREATH_DAYS[state.language].map((day, index) => `
    <button class="breath-day ${done.includes(index) ? "is-done" : ""}" onclick="toggleBreathDay('${session.id}', ${index})">${day}</button>
  `).join("");
}

function toggleBreathDay(sessionId, index) {
  const key = storageKey(sessionId, "breath-days");
  const done = getStored(key, []);
  const next = done.includes(index) ? done.filter(item => item !== index) : [...done, index];
  setStored(key, next);
  buildBreathDays(currentSession());
}

function toggleBreath() {
  if (state.breathRunning) {
    stopBreath(true);
    return;
  }
  state.breathRunning = true;
  state.breathStep = 0;
  runBreath();
}

function runBreath() {
  const circle = document.getElementById("breath-circle");
  if (!circle || !state.breathRunning) return;
  const inhale = state.breathStep % 2 === 0;
  circle.textContent = inhale ? ui("inhale") : ui("exhale");
  circle.classList.toggle("inhale", inhale);
  state.breathStep += 1;
  state.breathTimer = setTimeout(runBreath, 5000);
}

function stopBreath(updateText = true) {
  if (state.breathTimer) clearTimeout(state.breathTimer);
  state.breathRunning = false;
  state.breathTimer = null;
  const circle = document.getElementById("breath-circle");
  if (circle && updateText) {
    circle.textContent = ui("start");
    circle.classList.remove("inhale");
  }
}

function toggleTapPoint(sessionId, index) {
  const key = storageKey(sessionId, "tapping");
  const done = getStored(key, []);
  const next = done.includes(index) ? done.filter(item => item !== index) : [...done, index];
  setStored(key, next);
  renderApp();
}

function toggleStoredIndex(sessionId, bucket, index) {
  const key = storageKey(sessionId, bucket);
  const done = getStored(key, []);
  const next = done.includes(index) ? done.filter(item => item !== index) : [...done, index];
  setStored(key, next);
  renderApp();
}

function saveContinuityChoice(sessionId, value) {
  setStored(storageKey(sessionId, "anchorChoice"), value);
}

function saveContinuityLetter(sessionId, value) {
  setStored(storageKey(sessionId, "continuityLetter"), value);
}

function previewInnerChildPhoto(event, sessionId) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const img = document.getElementById(`inner-photo-preview-${sessionId}`);
    const label = document.getElementById(`inner-photo-label-${sessionId}`);
    if (img) {
      img.src = reader.result;
      img.classList.add("is-visible");
    }
    if (label) label.textContent = state.language === "pt" ? "foto adicionada" : "photo added";
  };
  reader.readAsDataURL(file);
}

function clearClientStorage() {
  const prefix = [STORAGE_PREFIX, currentClient().id].join(":");
  Object.keys(localStorage).forEach(key => {
    if (key.startsWith(prefix)) localStorage.removeItem(key);
  });
  renderApp();
}

window.addEventListener("DOMContentLoaded", renderApp);

  </script>
</body>
